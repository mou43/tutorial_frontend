<div class="container">
    @if (rental.id) {
    <h1>Modificar Préstamo</h1>
    } @else {
    <h1>Crear Préstamos</h1>
    }

    <form>
        <mat-form-field>
            <mat-label>Identificador</mat-label>
            <input type="text" matInput placeholder="Identificador" [(ngModel)]="rental.id" name="id" disabled>
        </mat-form-field>

        <mat-form-field>
            <mat-label>Título</mat-label>
            <mat-select disableRipple [(ngModel)]="rental.game" name="game" required>
                @for (game of games; track game.id) {
                <mat-option [value]="game">{{game.title}}</mat-option>
                }
            </mat-select>
            <mat-error>El juego no puede estar vacio</mat-error>
        </mat-form-field>

        <mat-form-field>
            <mat-label>Cliente</mat-label>
            <mat-select disableRipple [(ngModel)]="rental.client" name="client" required>
                @for (client of clients; track client.id) {
                <mat-option [value]="client">{{client.name}}</mat-option>
                }
            </mat-select>
            <mat-error>El cliente no puede estar vacio</mat-error>
        </mat-form-field>

        <mat-form-field>
            <mat-label>Fecha de préstamo</mat-label>
            <input matInput [matDatepicker]="picker" [(ngModel)]="rental.rentalDate" name="date">
            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>

            <input matInput [matDatepicker]="picker" [(ngModel)]="rental.returnDate" name="date">
            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

    </form>

    <div class="buttons">
        <button mat-stroked-button (click)="onClose()">Cerrar</button>
        <button mat-flat-button color="primary" (click)="onSave()">Guardar</button>
    </div>
</div>
