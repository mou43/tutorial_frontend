<div class="container">
    <h1>Préstamo de juegos</h1>

    <div class="filters">
        <form>
            <mat-form-field>
                <mat-label>Título</mat-label>
                <mat-select disableRipple [(ngModel)]="filterGame" name="game">
                    @for (game of games; track game.id) {
                        <mat-option [value]="game">{{ game.title }}</mat-option>
                    }
                </mat-select>
            </mat-form-field>

            <mat-form-field>
                <mat-label>Cliente</mat-label>
                <mat-select disableRipple [(ngModel)]="filterClient" name="client">
                    @for (client of clients; track client.id) {
                        <mat-option [value]="client">{{ client.name }}</mat-option>
                    }
                </mat-select>
            </mat-form-field>

            <mat-form-field>
                <mat-label>Fecha</mat-label>
                <mat-select >
                </mat-select>
            </mat-form-field>
        </form>

        <div class="buttons">
            <button mat-stroked-button (click)="onCleanFilter()">Limpiar</button>
            <button mat-stroked-button (click)="onSearch()">Filtrar</button>
        </div>
    </div>

    <div class="game-list">
        @for (game of games; track game.id) {
            <app-game-item (click)="editGame(game)" [game]="game" />
        }
    </div>

    <div class="buttons">
        <button mat-flat-button color="primary" (click)="createGame()">
            Nuevo juego
        </button>
    </div>
</div>
